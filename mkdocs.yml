site_name: AWK Bioinformatics Cookbook
site_url: https://chrstphdm.github.io/awk-bioinfo-cookbook
repo_url: https://github.com/chrstphdm/awk-bioinfo-cookbook
repo_name: chrstphdm/awk-bioinfo-cookbook

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - admonition

nav:
  - Home: index.md
  - Why AWK?: 00-why-awk.md
  - Fundamentals: 01-fundamentals.md
  - FASTQ: 02-fastq.md
  - FASTA: 03-fasta.md
  - BED / GFF: 04-bed-gff.md
  - VCF: 05-vcf.md
  - SAM-derived TSV: 06-sam-tsv.md
  - Two-file Joins: 07-joins.md
  - Reports & Aggregation: 08-reports.md
  - Advanced Patterns: 09-advanced.md
  - getline: 10-getline.md
  - Testing AWK Scripts: 10-testing.md
  - GTF Annotation: 11-gtf.md
  - RNA-seq Counts: 12-rnaseq.md
  - Multi-sample Patterns: 13-multi-sample.md
  - AWK in Nextflow: 15-nextflow.md
  - Workflows: 16-workflows.md
  - Test Data: data/README.md
